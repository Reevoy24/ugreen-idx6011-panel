name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:12

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libdrm-dev libcurl4-openssl-dev pkg-config git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: make

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          build_deb() {
            local suffix="$1"
            local blacklist="$2"
            local pkg="ug-paneld_${VERSION}${suffix}_amd64"

            mkdir -p "${pkg}/DEBIAN"
            mkdir -p "${pkg}/usr/bin"
            mkdir -p "${pkg}/lib/systemd/system"
            mkdir -p "${pkg}/etc/ug-paneld"

            cp ug-paneld "${pkg}/usr/bin/"
            cp ug-paneld.service "${pkg}/lib/systemd/system/"

            local desc_extra=""
            if [ "$blacklist" = "yes" ]; then
              mkdir -p "${pkg}/etc/modprobe.d"
              echo "blacklist i2c_hid_acpi" > "${pkg}/etc/modprobe.d/no-i2c-hid.conf"
              desc_extra=" Blacklists i2c-hid-acpi to free the touchscreen."

              printf "/etc/modprobe.d/no-i2c-hid.conf\n" > "${pkg}/DEBIAN/conffiles"
            fi

            cat > "${pkg}/DEBIAN/control" <<CTRL
          Package: ug-paneld
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Adam Conway
          Depends: libdrm2, libcurl4
          Description: Front panel display controller for Ugreen iDX6011 Pro NAS
           Drives the 258x960 display, backlight, and touchscreen from userspace.${desc_extra}
          CTRL
            sed -i 's/^          //' "${pkg}/DEBIAN/control"

            cat > "${pkg}/DEBIAN/postinst" <<'SCRIPT'
          #!/bin/sh
          systemctl daemon-reload
          systemctl enable ug-paneld 2>/dev/null || true
          systemctl restart ug-paneld 2>/dev/null || true
          echo "ug-paneld installed and (re)started."
          SCRIPT
            sed -i 's/^          //' "${pkg}/DEBIAN/postinst"
            chmod 755 "${pkg}/DEBIAN/postinst"

            cat > "${pkg}/DEBIAN/prerm" <<'SCRIPT'
          #!/bin/sh
          systemctl stop ug-paneld 2>/dev/null || true
          systemctl disable ug-paneld 2>/dev/null || true
          SCRIPT
            sed -i 's/^          //' "${pkg}/DEBIAN/prerm"
            chmod 755 "${pkg}/DEBIAN/prerm"

            dpkg-deb --build "${pkg}"
          }

          build_deb "" "yes"
          build_deb "_no-blacklist" "no"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: "*.deb"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
          generate_release_notes: true
